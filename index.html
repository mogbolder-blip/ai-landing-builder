<!DOCTYPE html>
<html>
<head>
<title>AI Landing Page Generator</title>

<style>

body{
font-family: Arial;
padding:40px;
background:#f5f5f5;
}

input{
padding:10px;
width:250px;
}

button{
padding:10px;
cursor:pointer;
}

#result{
margin-top:40px;
background:white;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>AI Landing Page Generator</h1>

<input id="idea" placeholder="write your idea">

<button onclick="generate()">Generate Landing</button>

<div id="result"></div>

<script>

function generate(){

let idea=document.getElementById("idea").value

let html=`

<section style="padding:40px;text-align:center">

<h1>${idea}</h1>

<p>The best solution for your needs</p>

<button style="padding:15px;background:black;color:white;border:none">
Get Started
</button>

</section>

`

document.getElementById("result").innerHTML=html

}

</script>

</body>

</html>
